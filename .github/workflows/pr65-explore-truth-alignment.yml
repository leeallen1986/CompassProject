name: PR65 Explore truth alignment

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/explore-server-order-visible-metrics

permissions:
  contents: write

jobs:
  validate-and-materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/explore-server-order-visible-metrics
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply deterministic Explore patch
        run: python scripts/apply_pr65_explore_truth_alignment.py
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Explore and account-context regression tests
        run: >-
          pnpm exec vitest run
          client/src/lib/exploreProjects.test.ts
          client/src/lib/fullPotentialProjectContext.test.ts
          client/src/lib/platformNavigation.test.ts
      - name: Commit clean validated application tree
        run: |
          rm -f scripts/apply_pr65_explore_truth_alignment.py
          rm -f .github/workflows/pr65-explore-truth-alignment.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(explore): preserve server rank and visible route metrics"
          git push origin HEAD:fix/explore-server-order-visible-metrics
