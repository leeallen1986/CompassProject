name: PR61 account context UI validation

on:
  push:
    branches:
      - feat/full-potential-account-context-ui

permissions:
  contents: write

jobs:
  validate-and-materialise:
    if: github.event.head_commit.message != 'feat(fp): connect project cards to Full Potential accounts'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-potential-account-context-ui
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply deterministic UI patch
        run: python scripts/apply_pr61_account_context_ui.py
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - run: >-
          pnpm exec vitest run
          client/src/lib/fullPotentialProjectContext.test.ts
          client/src/lib/platformNavigation.test.ts
          client/src/lib/fullPotentialCommercialModel.test.ts
          client/src/lib/fullPotentialPilot.test.ts
      - name: Commit validated application files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            client/src/components/ProjectCard.tsx \
            client/src/pages/Home.tsx \
            client/src/pages/ThisWeek.tsx
          git commit -m "feat(fp): connect project cards to Full Potential accounts"
          git push origin HEAD:feat/full-potential-account-context-ui
