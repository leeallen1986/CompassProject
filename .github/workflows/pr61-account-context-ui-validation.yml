name: PR61 account context UI validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-and-materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-potential-account-context-ui
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply deterministic UI patch when needed
        run: |
          if grep -q 'FullPotentialAccountContext from' client/src/components/ProjectCard.tsx; then
            echo "PR61 application patch is already materialised"
          else
            python scripts/apply_pr61_account_context_ui.py
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - run: >-
          pnpm exec vitest run
          client/src/lib/fullPotentialProjectContext.test.ts
          client/src/lib/platformNavigation.test.ts
          client/src/lib/fullPotentialCommercialModel.test.ts
          client/src/lib/fullPotentialPilot.test.ts
      - name: Commit validated application files
        run: |
          if git diff --quiet -- \
            client/src/components/ProjectCard.tsx \
            client/src/pages/Home.tsx \
            client/src/pages/ThisWeek.tsx; then
            echo "Validated application files are already committed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            client/src/components/ProjectCard.tsx \
            client/src/pages/Home.tsx \
            client/src/pages/ThisWeek.tsx
          git commit -m "feat(fp): connect project cards to Full Potential accounts"
          git push origin HEAD:feat/full-potential-account-context-ui
