name: PR63 commercial truth guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/commercial-truth-guardrails

permissions:
  contents: write

jobs:
  validate-and-materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/commercial-truth-guardrails
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply deterministic guardrail patch
        run: |
          rm -f docs/.pr63-patch-error docs/.pr63-test-error
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_pr63_commercial_truth_guardrails.py')
          text = path.read_text()
          text = text.replace(
              "'[\\\\b(residential|apartment|townhouse|housing estate|retirement village|social housing|affordable housing)\\\\b/",
              "'[/\\\\b(residential|apartment|townhouse|housing estate|retirement village|social housing|affordable housing)\\\\b/",
          )
          text = text.replace(
              "'[\\\\b(residential|townhouse|housing estate|retirement village|social housing|affordable housing)\\\\b/",
              "'[/\\\\b(residential|townhouse|housing estate|retirement village|social housing|affordable housing)\\\\b/",
          )
          old_initials = '''function companyInitials(value: string): string {
            return significantCompanyTokens(value).map(token => token[0]).join("").toLowerCase();
          }'''
          new_initials = '''function companyInitials(value: string): string {
            const words = String(value).match(/[A-Za-z0-9]+/g) ?? [];
            const initials: string[] = [];
            for (const word of words) {
              if (/^(and|the)$/i.test(word)) continue;
              if (/^[A-Z0-9]{2,5}$/.test(word)) initials.push(...word.toLowerCase().split(""));
              else initials.push(word[0].toLowerCase());
            }
            return initials.join("");
          }'''
          if old_initials not in text:
              raise SystemExit('companyInitials patch target not found')
          text = text.replace(old_initials, new_initials, 1)
          path.write_text(text)
          PY
          if ! python scripts/apply_pr63_commercial_truth_guardrails.py > /tmp/pr63-patch.log 2>&1; then
            cat /tmp/pr63-patch.log
            cp /tmp/pr63-patch.log docs/.pr63-patch-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr63-patch-error
            git commit -m "ci: record PR63 patch failure"
            git push origin HEAD:fix/commercial-truth-guardrails
            exit 1
          fi
          cat /tmp/pr63-patch.log
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Guardrail and regression tests
        run: |
          if ! pnpm exec vitest run \
            server/commercialTruthGuardrails.test.ts \
            server/fullPotentialAccountMatching.composites.test.ts \
            server/fullPotentialAccountMatching.shared.test.ts \
            server/laneScoring.test.ts > /tmp/pr63-tests.log 2>&1; then
            cat /tmp/pr63-tests.log
            cp /tmp/pr63-tests.log docs/.pr63-test-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr63-test-error
            git commit -m "ci: record PR63 test failure"
            git push origin HEAD:fix/commercial-truth-guardrails
            exit 1
          fi
          cat /tmp/pr63-tests.log
      - name: Commit validated application tree
        run: |
          rm -f scripts/apply_pr63_commercial_truth_guardrails.py
          rm -f .github/workflows/pr63-commercial-truth-guardrails.yml
          rm -f .github/workflows/pr62-explore-projects-validation.yml
          rm -f docs/.pr63-patch-error docs/.pr63-test-error
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(intelligence): harden territory and contractor truth"
          git push origin HEAD:fix/commercial-truth-guardrails
