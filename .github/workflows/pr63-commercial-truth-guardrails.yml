name: PR63 commercial truth guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/commercial-truth-guardrails

permissions:
  contents: write

jobs:
  validate-and-materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/commercial-truth-guardrails
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply deterministic guardrail patch
        run: |
          rm -f docs/.pr63-patch-error
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_pr63_commercial_truth_guardrails.py')
          text = path.read_text()
          text = text.replace(
              "'[\\\\b(residential|apartment|townhouse|housing estate|retirement village|social housing|affordable housing)\\\\b/",
              "'[/\\\\b(residential|apartment|townhouse|housing estate|retirement village|social housing|affordable housing)\\\\b/",
          )
          text = text.replace(
              "'[\\\\b(residential|townhouse|housing estate|retirement village|social housing|affordable housing)\\\\b/",
              "'[/\\\\b(residential|townhouse|housing estate|retirement village|social housing|affordable housing)\\\\b/",
          )
          path.write_text(text)
          PY
          if ! python scripts/apply_pr63_commercial_truth_guardrails.py > /tmp/pr63-patch.log 2>&1; then
            cat /tmp/pr63-patch.log
            cp /tmp/pr63-patch.log docs/.pr63-patch-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr63-patch-error
            git commit -m "ci: record PR63 patch failure"
            git push origin HEAD:fix/commercial-truth-guardrails
            exit 1
          fi
          cat /tmp/pr63-patch.log
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Guardrail and regression tests
        run: >-
          pnpm exec vitest run
          server/commercialTruthGuardrails.test.ts
          server/fullPotentialAccountMatching.composites.test.ts
          server/fullPotentialAccountMatching.shared.test.ts
          server/laneScoring.test.ts
      - name: Commit validated application tree
        run: |
          rm -f scripts/apply_pr63_commercial_truth_guardrails.py
          rm -f .github/workflows/pr63-commercial-truth-guardrails.yml
          rm -f .github/workflows/pr62-explore-projects-validation.yml
          rm -f docs/.pr63-patch-error
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(intelligence): harden territory and contractor truth"
          git push origin HEAD:fix/commercial-truth-guardrails
