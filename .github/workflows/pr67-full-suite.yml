name: PR67 full regression suite

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/intelligence-contact-trust-hardening
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Full Vitest suite
        run: |
          rm -f docs/.pr67-full-error
          if ! pnpm exec vitest run > /tmp/pr67-full.log 2>&1; then
            tail -n 300 /tmp/pr67-full.log
            cp /tmp/pr67-full.log docs/.pr67-full-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr67-full-error
            git commit -m "ci: record PR67 full-suite failure"
            git push origin HEAD:fix/intelligence-contact-trust-hardening
            exit 1
          fi
          cat /tmp/pr67-full.log
      - name: Remove temporary full-suite workflow
        run: |
          rm -f .github/workflows/pr67-full-suite.yml
          rm -f docs/.pr67-full-error
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(intelligence): validate full regression suite"
          git push origin HEAD:fix/intelligence-contact-trust-hardening
