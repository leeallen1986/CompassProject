name: Validate PR44 signal review queue

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-pr44:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: compass_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/compass_test
      TZ: UTC

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create clean test schema
        run: pnpm exec drizzle-kit push --force

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Signal review queue tests
        id: queue_tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm test -- server/fullPotential.listSignalQueue.test.ts > pr44-queue-test.log 2>&1
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          tail -n 250 pr44-queue-test.log
          exit "$exit_code"

      - name: Upload queue test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr44-queue-test-log
          path: pr44-queue-test.log
          if-no-files-found: error

      - name: Stop after queue test failure
        if: steps.queue_tests.outputs.exit_code != '0'
        run: exit 1

      - name: Signal import regression tests
        run: pnpm test -- server/fullPotential.importSignals.test.ts

      - name: Matched signal regression tests
        run: pnpm test -- server/fullPotential.matchedSignalsForAccount.test.ts

      - name: Signal promotion regression tests
        run: pnpm test -- server/fullPotential.promoteMatchedSignalToAction.test.ts
