name: Assemble PR44 on pull request

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-air-fp-signal-review-queue
          fetch-depth: 0

      - name: Assemble PR44 changes
        run: |
          python scripts/pr44_patch.py
          python scripts/pr44_fix_types.py

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm tsc --noEmit 2>&1 | tee pr44-tsc-errors.txt

      - name: Publish typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr44-tsc-errors.txt
          git commit -m "chore: capture PR44 typecheck diagnostics"
          git push origin HEAD:feature/portable-air-fp-signal-review-queue

      - name: Commit assembled changes
        if: steps.typecheck.outcome == 'success'
        shell: bash
        run: |
          rm -f .github/workflows/pr44-build.yml
          rm -f .github/workflows/pr44-pr-build.yml
          rm -f scripts/pr44_patch.py
          rm -f scripts/pr44_fix_types.py
          rm -f pr44-tsc-errors.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(fp): add Portable Air signal review queue"
          git push origin HEAD:feature/portable-air-fp-signal-review-queue
