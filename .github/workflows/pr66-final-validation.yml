name: PR66 final validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Read-only recommendation and regression tests
        run: >-
          pnpm exec vitest run
          server/fullPotentialNextBest5.shared.test.ts
          server/fullPotentialNextBest5.http.test.ts
          server/commercialTruthGuardrails.test.ts
          server/fullPotentialAccountMatching.shared.test.ts
          client/src/lib/exploreProjects.test.ts
