name: PR58 validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-potential-ai-daily-activation
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Materialise hardened application tree
        run: |
          python3 scripts/pr58_harden.py
          python3 scripts/pr58_harden_followup.py
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - run: >-
          pnpm exec vitest run
          server/fullPotentialDailyActivation.shared.test.ts
          server/fullPotentialDailyActivation.http.test.ts
      - name: Commit the validated application tree and remove temporary tooling
        run: |
          rm -f server/fullPotentialDailyActivation.augmentation.d.ts
          rm -f scripts/pr58_harden.py scripts/pr58_harden_followup.py
          rm -f .github/workflows/pr58-hardening.yml
          rm -f .github/workflows/pr58-hardening-v2.yml
          rm -f .github/workflows/pr58-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(fp): harden daily activation feedback loop"
          git push origin HEAD:feat/full-potential-ai-daily-activation
