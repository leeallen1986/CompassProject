name: PR66 final commercial guardrails

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-and-materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-next-best-5
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply final commercial guardrails
        run: |
          rm -f docs/.pr66-final-error
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/apply_pr66_final_guardrails.py")
          text = path.read_text()
          text = text.replace(
              "'''- linked to a confirmed or likely-high canonical account route\n- owned by the authenticated rep'''",
              "'''- the canonical buying route is confirmed or likely-high\n- the matched account has no open Full Potential action'''",
          )
          text = text.replace(
              "'''- linked to a confirmed or likely-high canonical account route\n- linked to a contractor, EPC, subcontractor, rental, supplier or awarded-contractor buying role; project-owner fallback is allowed only for explicit Direct CAPEX\n- owned by the authenticated rep'''",
              "'''- the canonical buying route is confirmed or likely-high\n- linked to a contractor, EPC, subcontractor, rental, supplier or awarded-contractor buying role; project-owner fallback is allowed only for explicit Direct CAPEX\n- the matched account has no open Full Potential action'''",
          )
          path.write_text(text)
          PY
          if ! python scripts/apply_pr66_final_guardrails.py > /tmp/pr66-final.log 2>&1; then
            cat /tmp/pr66-final.log
            cp /tmp/pr66-final.log docs/.pr66-final-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr66-final-error
            git commit -m "ci: record PR66 final guardrail failure"
            git push origin HEAD:feat/read-only-next-best-5
            exit 1
          fi
          cat /tmp/pr66-final.log
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Read-only recommendation and regression tests
        run: >-
          pnpm exec vitest run
          server/fullPotentialNextBest5.shared.test.ts
          server/fullPotentialNextBest5.http.test.ts
          server/commercialTruthGuardrails.test.ts
          server/fullPotentialAccountMatching.shared.test.ts
          client/src/lib/exploreProjects.test.ts
      - name: Commit clean validated application tree
        run: |
          rm -f scripts/apply_pr66_final_guardrails.py
          rm -f .github/workflows/pr66-final-guardrails.yml
          rm -f docs/.pr66-final-error
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(fp): require explicit air evidence and credible buying roles"
          git push origin HEAD:feat/read-only-next-best-5
