name: PR64 Specialty Air profile mapping

on:
  push:
    branches:
      - fix/specialty-air-scoring-mapping

permissions:
  contents: write

jobs:
  validate-and-materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/specialty-air-scoring-mapping
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply deterministic mapping patch
        run: python scripts/apply_pr64_specialty_air_mapping.py
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Specialty Air profile tests
        run: pnpm exec vitest run server/canonicalMappings.specialtyAir.test.ts
      - name: Canonical mapping regression tests
        run: |
          if test -f server/canonicalMappings.test.ts; then
            pnpm exec vitest run server/canonicalMappings.test.ts
          else
            echo "No pre-existing canonicalMappings.test.ts file"
          fi
      - name: Commit clean validated tree
        run: |
          rm -f scripts/apply_pr64_specialty_air_mapping.py
          rm -f .github/workflows/pr64-specialty-air-mapping.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(profile): map Specialty Air to nitrogen and booster"
          git push origin HEAD:fix/specialty-air-scoring-mapping
