name: PR58 final validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-potential-ai-daily-activation
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply final safeguards
        run: python3 scripts/pr58_final_harden.py
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - run: >-
          pnpm exec vitest run
          server/fullPotentialDailyActivation.shared.test.ts
          server/fullPotentialDailyActivation.http.test.ts
      - name: Commit validated final application tree
        run: |
          rm -f scripts/pr58_final_harden.py
          rm -f .github/workflows/pr58-final-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(fp): lock AI facts and recommendation writes"
          git push origin HEAD:feat/full-potential-ai-daily-activation
