name: PR62 Explore Projects sales board validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/explore-projects-sales-board

permissions:
  contents: write

jobs:
  validate-and-fix:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'fix(explore): align tender timing labels'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/explore-projects-sales-board
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply calendar-day tender label fix
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          helper = Path('client/src/lib/exploreProjects.ts')
          text = helper.read_text()
          pattern = re.compile(
              r'  const time = closeDate\.getTime\(\);\n'
              r'  if \(Number\.isNaN\(time\)\) return "Close date not confirmed";\n\n'
              r'  const days = Math\.ceil\(\(time - now\.getTime\(\)\) / \(24 \* 60 \* 60 \* 1000\)\);\n'
              r'  if \(days < 0\) return "Closed";\n'
              r'  if \(days === 0\) return "Closes today";\n'
              r'  if \(days === 1\) return "Closes tomorrow";\n'
              r'  return `Closes in \$\{days\} days`;'
          )
          replacement = '''  if (Number.isNaN(closeDate.getTime()) || Number.isNaN(now.getTime())) {
            return "Close date not confirmed";
          }

          const closeDay = Date.UTC(
            closeDate.getUTCFullYear(),
            closeDate.getUTCMonth(),
            closeDate.getUTCDate(),
          );
          const currentDay = Date.UTC(
            now.getUTCFullYear(),
            now.getUTCMonth(),
            now.getUTCDate(),
          );
          const days = Math.round((closeDay - currentDay) / (24 * 60 * 60 * 1000));

          if (days < 0) return "Closed";
          if (days === 0) return "Closes today";
          if (days === 1) return "Closes tomorrow";
          return `Closes in ${days} days`;'''
          text, count = pattern.subn(replacement, text, count=1)
          if count == 1:
            helper.write_text(text)
          elif 'const closeDay = Date.UTC(' not in text:
            raise SystemExit(f'expected tender label block once, found {count}')

          test = Path('client/src/lib/exploreProjects.test.ts')
          test_text = test.read_text()
          old_line = '    expect(closingWindowLabel("2026-07-21T12:00:00.000Z", now)).toBe("Closes in 2 days");'
          new_lines = '''    expect(closingWindowLabel("2026-07-21T12:00:00.000Z", now)).toBe("Closes tomorrow");
              expect(closingWindowLabel("2026-07-22T00:00:00.000Z", now)).toBe("Closes in 2 days");'''
          if old_line in test_text:
            test.write_text(test_text.replace(old_line, new_lines, 1))
          elif 'Closes tomorrow' not in test_text:
            raise SystemExit('expected tender timing assertion was not found')
          PY
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Explore Projects helpers
        run: pnpm exec vitest run client/src/lib/exploreProjects.test.ts
      - name: Full Potential account context regression
        run: pnpm exec vitest run client/src/lib/fullPotentialProjectContext.test.ts
      - name: Platform navigation regression
        run: pnpm exec vitest run client/src/lib/platformNavigation.test.ts
      - name: Commercial model regression
        run: pnpm exec vitest run client/src/lib/fullPotentialCommercialModel.test.ts
      - name: Pilot regression
        run: pnpm exec vitest run client/src/lib/fullPotentialPilot.test.ts
      - name: Commit validated timing fix
        run: |
          if git diff --quiet -- client/src/lib/exploreProjects.ts client/src/lib/exploreProjects.test.ts; then
            echo "Tender timing fix already committed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/src/lib/exploreProjects.ts client/src/lib/exploreProjects.test.ts
          git commit -m "fix(explore): align tender timing labels"
          git push origin HEAD:feat/explore-projects-sales-board
