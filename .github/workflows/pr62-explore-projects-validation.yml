name: PR62 Explore Projects sales board validation

on:
  push:
    branches:
      - feat/explore-projects-sales-board

permissions:
  contents: write

jobs:
  validate:
    if: github.event.head_commit.message != 'ci: record PR62 validation pass'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/explore-projects-sales-board
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Explore Projects helpers
        run: pnpm exec vitest run client/src/lib/exploreProjects.test.ts
      - name: Full Potential account context regression
        run: pnpm exec vitest run client/src/lib/fullPotentialProjectContext.test.ts
      - name: Platform navigation regression
        run: pnpm exec vitest run client/src/lib/platformNavigation.test.ts
      - name: Commercial model regression
        run: pnpm exec vitest run client/src/lib/fullPotentialCommercialModel.test.ts
      - name: Pilot regression
        run: pnpm exec vitest run client/src/lib/fullPotentialPilot.test.ts
      - name: Record successful validation
        run: |
          cat > docs/.pr62-validation-pass <<'EOF'
          pnpm install --frozen-lockfile: PASS
          pnpm tsc --noEmit: PASS
          pnpm build: PASS
          exploreProjects.test.ts: PASS
          fullPotentialProjectContext.test.ts: PASS
          platformNavigation.test.ts: PASS
          fullPotentialCommercialModel.test.ts: PASS
          fullPotentialPilot.test.ts: PASS
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/.pr62-validation-pass
          git commit -m "ci: record PR62 validation pass"
          git push origin HEAD:feat/explore-projects-sales-board
