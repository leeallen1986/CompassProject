name: PR66 read-only Next Best 5 validation

on:
  push:
    branches:
      - feat/read-only-next-best-5

permissions:
  contents: write

jobs:
  validate-and-materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-next-best-5
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply deterministic integration patch
        run: python scripts/apply_pr66_read_only_next_best_5.py
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - name: Read-only recommendation and regression tests
        run: >-
          pnpm exec vitest run
          server/fullPotentialNextBest5.shared.test.ts
          server/fullPotentialNextBest5.http.test.ts
          server/commercialTruthGuardrails.test.ts
          server/fullPotentialAccountMatching.shared.test.ts
          client/src/lib/exploreProjects.test.ts
      - name: Commit clean validated application tree
        run: |
          rm -f scripts/apply_pr66_read_only_next_best_5.py
          rm -f .github/workflows/pr66-read-only-next-best-5.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(fp): add read-only grounded Next Best 5"
          git push origin HEAD:feat/read-only-next-best-5
