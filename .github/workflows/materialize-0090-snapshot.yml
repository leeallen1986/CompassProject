name: Materialize Drizzle 0090 snapshot

on:
  push:
    branches:
      - fix/add-0090-snapshot
    paths:
      - .github/workflows/materialize-0090-snapshot.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/add-0090-snapshot
          fetch-depth: 0

      - name: Materialize and verify exact snapshot
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/0090_snapshot.json.gz.b64 <<'SNAPSHOT_B64'






SNAPSHOT_B64
          base64 --decode /tmp/0090_snapshot.json.gz.b64 > /tmp/0090_snapshot.json.gz
          gzip --decompress --stdout /tmp/0090_snapshot.json.gz > drizzle/meta/0090_snapshot.json
          echo "1029dce0391915479e7c66e164fa22eabb9e8b1cb32f0f369b4f84c7a9c7abea  drizzle/meta/0090_snapshot.json" | sha256sum --check --strict
          python -m json.tool drizzle/meta/0090_snapshot.json >/dev/null

      - name: Commit only the exact snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drizzle/meta/0090_snapshot.json
          git rm .github/workflows/materialize-0090-snapshot.yml
          git diff --cached --name-only
          test "$(git diff --cached --name-only | sort | tr '\n' ' ')" = ".github/workflows/materialize-0090-snapshot.yml drizzle/meta/0090_snapshot.json "
          git commit -m "fix(db): add exact Drizzle 0090 snapshot"
          git push origin HEAD:fix/add-0090-snapshot
