name: PR60 Full Potential account matching validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-and-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      test_status: ${{ steps.tests.outputs.status }}
      test_output: ${{ steps.tests.outputs.text }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-potential-project-account-matching
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply validated matcher safeguards
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('server/fullPotentialAccountMatching.shared.ts')
          text = path.read_text()

          old_method = '  const method = exactMatch ? termMethod(selected.term) : selected.method;\n'
          new_method = '  const method: FullPotentialMatchMethod = "method" in selected ? selected.method as FullPotentialMatchMethod : termMethod(selected.term);\n'
          if old_method in text:
              text = text.replace(old_method, new_method, 1)
          elif new_method not in text:
              raise SystemExit('matcher type-narrowing location was not found')

          old_loop = '''  const bestByAccount = new Map<number, { term: FullPotentialMatchTerm; score: number }>();
  for (const term of matches) {
    const account = index.accountsById.get(term.canonicalAccountId);
    if (!account) continue;
    const score = clamp(96 + TERM_KIND_BONUS[term.kind] + stateScore(candidate.state, account.state));
'''
          new_loop = '''  const bestByAccount = new Map<number, { term: FullPotentialMatchTerm; score: number }>();
  const exactCandidateName = normalizeCompanyName(candidate.name);
  const candidateHasDistinctiveIdentity = significantCompanyTokens(exactCandidateName).length > 0;
  for (const term of matches) {
    const account = index.accountsById.get(term.canonicalAccountId);
    if (!account) continue;
    if (!candidateHasDistinctiveIdentity && normalizeCompanyName(term.value) !== exactCandidateName) continue;
    const score = clamp(96 + TERM_KIND_BONUS[term.kind] + stateScore(candidate.state, account.state));
'''
          if old_loop in text:
              text = text.replace(old_loop, new_loop, 1)
          elif new_loop not in text:
              raise SystemExit('generic-name exact-match safeguard location was not found')

          path.write_text(text)
          PY
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - id: tests
        shell: bash
        run: |
          set +e
          OUTPUT="$(pnpm exec vitest run server/testDatabaseSafety.test.ts server/fullPotentialAccountMatching.shared.test.ts server/fullPotentialAccountMatching.http.test.ts 2>&1)"
          STATUS=$?
          {
            echo "status=$STATUS"
            echo "text<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0
      - if: steps.tests.outputs.status == '0'
        name: Commit validated matcher safeguards
        run: |
          if git diff --quiet -- server/fullPotentialAccountMatching.shared.ts; then
            echo "Validated matcher already contains the safeguards"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/fullPotentialAccountMatching.shared.ts
          git commit -m "fix(fp): harden canonical account matching safeguards"
          git push origin HEAD:feat/full-potential-project-account-matching

  test-diagnostics:
    needs: validate-and-fix
    if: needs.validate-and-fix.outputs.test_status != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Print test failures
        run: |
          cat <<'EOF'
          ${{ needs.validate-and-fix.outputs.test_output }}
          EOF
          exit 1
