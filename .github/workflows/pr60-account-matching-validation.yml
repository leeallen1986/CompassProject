name: PR60 Full Potential account matching validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-and-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-potential-project-account-matching
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply matcher type narrowing
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('server/fullPotentialAccountMatching.shared.ts')
          text = path.read_text()
          old = '  const method = exactMatch ? termMethod(selected.term) : selected.method;\n'
          new = '  const method = "method" in selected ? selected.method : termMethod(selected.term);\n'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('matcher type-narrowing location was not found')
          PY
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
      - run: >-
          pnpm exec vitest run
          server/testDatabaseSafety.test.ts
          server/fullPotentialAccountMatching.shared.test.ts
          server/fullPotentialAccountMatching.http.test.ts
      - name: Commit validated type fix
        run: |
          if git diff --quiet -- server/fullPotentialAccountMatching.shared.ts; then
            echo "Validated matcher already contains the type fix"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/fullPotentialAccountMatching.shared.ts
          git commit -m "fix(fp): narrow exact and fuzzy match result types"
          git push origin HEAD:feat/full-potential-project-account-matching
