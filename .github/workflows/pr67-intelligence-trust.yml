name: PR67 intelligence and contact trust hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-and-materialise:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/intelligence-contact-trust-hardening
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply trust hardening
        run: |
          rm -f docs/.pr67-error
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/apply_pr67_intelligence_trust.py")
          text = path.read_text()
          old = '''text = replace_once(text, old_count, new_count, path)
          old_roles = ''' + "'''" + '''    .from(contacts)
              .where(
                and(
                  sql`${contacts.project} = ${projectName}`,
                  sql`${contacts.roleRelevance} IN ('high', 'medium')`
                )
              );''' + "'''" + '''
          text = replace_once(text, old_roles, new_count, path)'''
          new = '''if text.count(old_count) != 2:
              raise RuntimeError(f"{path}: expected the project-name contact query twice, found {text.count(old_count)}")
          text = text.replace(old_count, new_count, 2)'''
          if old not in text:
              raise SystemExit("PR67 prepatch target not found")
          path.write_text(text.replace(old, new, 1))
          PY
          if ! python scripts/apply_pr67_intelligence_trust.py > /tmp/pr67.log 2>&1; then
            cat /tmp/pr67.log
            cp /tmp/pr67.log docs/.pr67-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr67-error
            git commit -m "ci: record PR67 materialisation failure"
            git push origin HEAD:fix/intelligence-contact-trust-hardening
            exit 1
          fi
          cat /tmp/pr67.log
          python - <<'PY'
          from pathlib import Path
          import re

          eligibility = Path("server/apolloEligibility.ts")
          text = eligibility.read_text().replace("APOLLO_APOLLO_DAILY_CREDIT_CAP", "APOLLO_DAILY_CREDIT_CAP")
          eligibility.write_text(text)

          contact = Path("server/contactEnrichment.ts")
          text = contact.read_text()
          text = re.sub(
              r'\n\s*if \(!contact\.email\) \{\n\s*const inferred = inferEmail\(contact\.name, contact\.company\);\n\s*if \(inferred\) updateData\.email = inferred;\n\s*\}',
              '',
              text,
          )
          text = text.replace('      // Still infer email even if LinkedIn not found\n', '')
          contact.write_text(text)

          web = Path("server/webStakeholderDiscovery.ts")
          text = web.read_text().replace('  inferEmail as _inferEmail,\n', '')
          web.write_text(text)
          PY
      - run: pnpm install --frozen-lockfile
      - name: TypeScript
        run: |
          if ! pnpm tsc --noEmit > /tmp/pr67-gate.log 2>&1; then
            cat /tmp/pr67-gate.log
            cp /tmp/pr67-gate.log docs/.pr67-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr67-error
            git commit -m "ci: record PR67 TypeScript failure"
            git push origin HEAD:fix/intelligence-contact-trust-hardening
            exit 1
          fi
          cat /tmp/pr67-gate.log
      - name: Build
        run: |
          if ! pnpm build > /tmp/pr67-gate.log 2>&1; then
            cat /tmp/pr67-gate.log
            cp /tmp/pr67-gate.log docs/.pr67-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr67-error
            git commit -m "ci: record PR67 build failure"
            git push origin HEAD:fix/intelligence-contact-trust-hardening
            exit 1
          fi
          cat /tmp/pr67-gate.log
      - name: Trust and regression tests
        run: |
          if ! pnpm exec vitest run \
            server/intelligenceTrustPolicy.test.ts \
            server/discoveryQueue.test.ts \
            server/fullPotentialNextBest5.shared.test.ts \
            server/fullPotentialAccountMatching.shared.test.ts \
            server/commercialTruthGuardrails.test.ts > /tmp/pr67-gate.log 2>&1; then
            cat /tmp/pr67-gate.log
            cp /tmp/pr67-gate.log docs/.pr67-error
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.pr67-error
            git commit -m "ci: record PR67 test failure"
            git push origin HEAD:fix/intelligence-contact-trust-hardening
            exit 1
          fi
          cat /tmp/pr67-gate.log
      - name: Commit clean validated application tree
        run: |
          rm -f scripts/apply_pr67_intelligence_trust.py
          rm -f .github/workflows/pr67-intelligence-trust.yml
          rm -f docs/.pr67-error
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(intelligence): harden contractor and contact trust"
          git push origin HEAD:fix/intelligence-contact-trust-hardening
